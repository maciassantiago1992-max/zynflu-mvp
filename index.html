<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zynflu — Conectando marcas con influencers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --coral:#D85A30;--coral-light:#FAECE7;--coral-dark:#993C1D;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --teal:#1D9E75;--teal-light:#E1F5EE;
  --bg:#F7F6F3;--card:#FFFFFF;--border:#E8E6E0;
  --text:#1A1A18;--muted:#6B6A65;--hint:#9C9B96;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;color:var(--coral);letter-spacing:-0.5px;}
.logo span{color:var(--purple);}
.tagline{font-size:12px;color:var(--hint);padding-left:12px;border-left:1px solid var(--border);margin-left:4px;}
.role-sw{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:2px;margin-left:auto;}
.rbtn{font-size:13px;padding:5px 16px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s;}
.rbtn.on{background:var(--card);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* LAYOUT */
.layout{display:flex;flex:1;}
.sidebar{width:210px;background:var(--card);border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.seclabel{font-size:10px;color:var(--hint);padding:6px 10px 8px;text-transform:uppercase;letter-spacing:.7px;}
.nitem{padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--muted);border:none;background:transparent;text-align:left;width:100%;display:flex;align-items:center;gap:9px;font-family:'DM Sans',sans-serif;transition:all .12s;}
.nitem.on{background:var(--coral-light);color:var(--coral-dark);font-weight:500;}
.nitem:hover:not(.on){background:var(--bg);}
.nicn{font-size:14px;width:18px;text-align:center;}

/* CONTENT */
.content{flex:1;padding:1.5rem;overflow-y:auto;background:var(--bg);}
.pgheader{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;}
.pgtitle{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;letter-spacing:-.3px;}
.pgsub{font-size:13px;color:var(--muted);margin-top:4px;}

/* METRICS */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.mgrid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
.mlbl{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.mval{font-size:24px;font-weight:600;font-family:'Space Grotesk',sans-serif;letter-spacing:-.5px;}
.msub{font-size:11px;color:var(--hint);margin-top:4px;}
.msub.up{color:var(--teal);}

/* CARDS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px;}
.card:last-child{margin-bottom:0;}
.stitle{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text);}
.row{display:flex;justify-content:space-between;align-items:center;}
.sep{border-bottom:1px solid var(--border);}

/* BADGES */
.badge{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;display:inline-block;}
.b-ok{background:var(--teal-light);color:#0F6E56;}
.b-warn{background:#FAEEDA;color:#854F0B;}
.b-info{background:var(--purple-light);color:var(--purple);}
.b-err{background:#FCEBEB;color:#A32D2D;}

/* BUTTONS */
.btn-p{background:var(--coral);color:white;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
.btn-p:hover{background:var(--coral-dark);}
.btn-s{background:transparent;color:var(--text);border:1px solid var(--border);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;}
.btn-s:hover{background:var(--bg);}

/* AVATARS */
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
.av-o{background:var(--coral-light);color:var(--coral);}
.av-p{background:var(--purple-light);color:var(--purple);}
.av-sq{border-radius:9px;}

/* BAR */
.bar-wrap{background:var(--bg);border-radius:4px;height:7px;overflow:hidden;margin-top:5px;}
.bar-fill{background:var(--coral);height:100%;border-radius:4px;}

/* CHART */
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.bar-rect{width:100%;border-radius:4px 4px 0 0;}

/* MISC */
select{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;}
.mono{font-family:monospace;font-size:12px;background:var(--bg);padding:2px 7px;border-radius:4px;color:var(--text);}
input[type=range]{accent-color:var(--coral);}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 24px;color:var(--muted);}
.empty-icon{font-size:32px;margin-bottom:12px;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="logo">Zyn<span>flu</span></span>
    <span class="tagline">Conectando marcas con influencers</span>
    <div class="role-sw">
      <button class="rbtn on" id="rb-inf" onclick="switchRole('influencer',this)">Influencer</button>
      <button class="rbtn" id="rb-brand" onclick="switchRole('brand',this)">Marca</button>
    </div>
  </div>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
let role='influencer', sec='dashboard';

const navI=[
  {id:'dashboard',icon:'◈',label:'Dashboard'},
  {id:'campaigns',icon:'◎',label:'Campañas'},
  {id:'contracts',icon:'◻',label:'Mis contratos'},
  {id:'earnings',icon:'◇',label:'Comisiones'},
  {id:'profile',icon:'◉',label:'Mi perfil'},
];
const navB=[
  {id:'dashboard',icon:'◈',label:'Dashboard'},
  {id:'campaigns',icon:'◎',label:'Mis campañas'},
  {id:'applications',icon:'◻',label:'Postulaciones'},
  {id:'analytics',icon:'◇',label:'Métricas'},
  {id:'settings',icon:'◉',label:'Configuración'},
];

function switchRole(r,el){
  role=r; sec='dashboard';
  document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}
function go(s){sec=s;render();}

function render(){
  const nav=role==='influencer'?navI:navB;
  const sb=document.getElementById('sidebar');
  sb.innerHTML=`<div class="seclabel">Menú</div>`+nav.map(n=>`<button class="nitem${sec===n.id?' on':''}" onclick="go('${n.id}')"><span class="nicn" style="color:${sec===n.id?'var(--coral)':'var(--hint)'}">${n.icon}</span>${n.label}</button>`).join('');
  document.getElementById('content').innerHTML=role==='influencer'?iView():bView();
}

function hdr(title,sub,btnLabel=''){
  return `<div class="pgheader"><div><div class="pgtitle">${title}</div>${sub?`<div class="pgsub">${sub}</div>`:''}</div>${btnLabel?`<button class="btn-p">${btnLabel}</button>`:''}</div>`;
}

/* ─── INFLUENCER VIEWS ─── */
function iView(){
  if(sec==='dashboard')return iDash();
  if(sec==='campaigns')return iCamp();
  if(sec==='contracts')return iContracts();
  if(sec==='earnings')return iEarnings();
  if(sec==='profile')return iProfile();
  return '';
}

function iDash(){
  return hdr('Hola, @camila_fit ✦','Tenés 3 nuevas oportunidades disponibles')+`
  <div class="mgrid">
    <div class="mcard"><div class="mlbl">Contratos activos</div><div class="mval" style="color:var(--coral)">4</div><div class="msub up">+1 este mes</div></div>
    <div class="mcard"><div class="mlbl">Total ganado</div><div class="mval">$2,840</div><div class="msub">USD acumulado</div></div>
    <div class="mcard"><div class="mlbl">Pago pendiente</div><div class="mval" style="color:var(--purple)">$420</div><div class="msub">Próximo: 1 abr</div></div>
    <div class="mcard"><div class="mlbl">Código usado</div><div class="mval">312</div><div class="msub">veces este mes</div></div>
  </div>
  <div class="grid2">
    <div>
      <div class="stitle">Contratos recientes</div>
      ${[{brand:'NutriBox',prod:'Cajas de snacks',st:'Activo',pct:'12%'},{brand:'FlowSport',prod:'Ropa deportiva',st:'Activo',pct:'15%'},{brand:'SkinGlow',prod:'Skincare set',st:'En revisión',pct:'10%'}].map(c=>`
      <div class="card row"><div style="display:flex;gap:10px;align-items:center"><div class="av av-o">${c.brand[0]}</div><div><div style="font-size:13px;font-weight:500">${c.brand}</div><div style="font-size:12px;color:var(--muted)">${c.prod}</div></div></div><div style="text-align:right"><span class="badge ${c.st==='Activo'?'b-ok':'b-warn'}">${c.st}</span><div style="font-size:12px;color:var(--muted);margin-top:3px">${c.pct} comisión</div></div></div>`).join('')}
    </div>
    <div>
      <div class="stitle">Campañas disponibles</div>
      ${[{brand:'VerdeMar',cat:'Suplementos',com:'18%',desc:'20%'},{brand:'KidsPlay',cat:'Juguetes',com:'14%',desc:'15%'},{brand:'BrewCo',cat:'Café premium',com:'20%',desc:'25%'}].map(c=>`
      <div class="card row"><div style="display:flex;gap:10px;align-items:center"><div class="av av-p">${c.brand[0]}</div><div><div style="font-size:13px;font-weight:500">${c.brand}</div><div style="font-size:12px;color:var(--muted)">${c.cat}</div></div></div><div style="text-align:right"><div style="font-size:16px;font-weight:600;color:var(--coral)">${c.com}</div><div style="font-size:11px;color:var(--muted)">${c.desc} desc. para audiencia</div></div></div>`).join('')}
    </div>
  </div>`;
}

function iCamp(){
  const data=[{brand:'VerdeMar',prod:'Suplementos naturales',cat:'Salud',com:'18%',desc:'20%',aud:'18-35',min:'5K+'},{brand:'KidsPlay',prod:'Juguetes educativos',cat:'Infantil',com:'14%',desc:'15%',aud:'25-40',min:'10K+'},{brand:'BrewCo',prod:'Café premium',cat:'Gastro',com:'20%',desc:'25%',aud:'22-45',min:'3K+'},{brand:'TechGear',prod:'Accesorios tech',cat:'Tech',com:'12%',desc:'18%',aud:'18-30',min:'8K+'},{brand:'PetLove',prod:'Comida mascotas',cat:'Mascotas',com:'22%',desc:'20%',aud:'Todos',min:'2K+'}];
  return hdr('Campañas disponibles','Encontrá marcas que se alineen con tu audiencia')+
  `<div style="display:flex;gap:8px;margin-bottom:1rem"><select><option>Todas las categorías</option><option>Salud</option><option>Tech</option><option>Moda</option></select><select><option>Mayor comisión</option><option>Más reciente</option></select></div>`+
  data.map(c=>`<div class="card"><div style="display:flex;gap:12px;align-items:flex-start"><div class="av av-p av-sq" style="width:44px;height:44px;">${c.brand[0]}</div><div style="flex:1"><div class="row"><div><div style="font-size:15px;font-weight:600">${c.brand}</div><div style="font-size:12px;color:var(--muted)">${c.prod} · ${c.cat}</div></div><span class="badge b-ok">Abierta</span></div><div style="display:flex;gap:1.5rem;margin-top:12px;padding:10px;background:var(--bg);border-radius:8px"><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Comisión</div><div style="font-size:17px;font-weight:600;color:var(--coral)">${c.com}</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Descuento</div><div style="font-size:17px;font-weight:600;color:var(--purple)">${c.desc}</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Audiencia</div><div style="font-size:14px;font-weight:500;margin-top:2px">${c.aud}</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Seg. mín.</div><div style="font-size:14px;font-weight:500;margin-top:2px">${c.min}</div></div></div></div><button class="btn-p" style="flex-shrink:0;margin-top:4px">Aplicar</button></div></div>`).join('');
}

function iContracts(){
  const data=[{brand:'NutriBox',prod:'Cajas de snacks',desde:'Ene 2025',com:'12%',desc:'20%',code:'CAMILA20',sales:48,st:'Activo'},{brand:'FlowSport',prod:'Ropa deportiva',desde:'Feb 2025',com:'15%',desc:'18%',code:'FLOW-CAM',sales:31,st:'Activo'},{brand:'SkinGlow',prod:'Skincare set',desde:'Mar 2025',com:'10%',desc:'15%',code:'SKIN15',sales:0,st:'En revisión'},{brand:'CookMaster',prod:'Utensilios',desde:'Nov 2024',com:'13%',desc:'12%',code:'COOK-CAM',sales:89,st:'Completado'}];
  return hdr('Mis contratos','Todos tus acuerdos activos con marcas')+data.map(c=>`<div class="card"><div class="row" style="margin-bottom:12px"><div style="display:flex;gap:10px;align-items:center"><div class="av av-o">${c.brand[0]}</div><div><div style="font-weight:600">${c.brand}</div><div style="font-size:12px;color:var(--muted)">${c.prod} · Desde ${c.desde}</div></div></div><span class="badge ${c.st==='Activo'?'b-ok':c.st==='En revisión'?'b-warn':'b-info'}">${c.st}</span></div><div style="display:flex;gap:2rem;padding:10px;background:var(--bg);border-radius:8px"><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Comisión</div><div style="font-weight:600;color:var(--coral);font-size:16px">${c.com}</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Descuento</div><div style="font-weight:600;color:var(--purple);font-size:16px">${c.desc}</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Tu código</div><div class="mono" style="margin-top:4px">${c.code}</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Ventas</div><div style="font-weight:600;font-size:16px">${c.sales}</div></div></div></div>`).join('');
}

function iEarnings(){
  const months=[{m:'Oct',v:310},{m:'Nov',v:480},{m:'Dic',v:620},{m:'Ene',v:540},{m:'Feb',v:470},{m:'Mar',v:420}];
  const max=620;
  return hdr('Mis comisiones','Historial de ganancias por ventas referidas')+`
  <div class="mgrid3" style="margin-bottom:1.25rem">
    <div class="mcard"><div class="mlbl">Total ganado</div><div class="mval" style="color:var(--coral)">$2,840</div><div class="msub">Desde el inicio</div></div>
    <div class="mcard"><div class="mlbl">Este mes</div><div class="mval">$420</div><div class="msub">-10% vs anterior</div></div>
    <div class="mcard"><div class="mlbl">Próximo cobro</div><div class="mval" style="color:var(--purple)">$420</div><div class="msub">1 de abril</div></div>
  </div>
  <div class="card" style="margin-bottom:1rem">
    <div class="stitle">Tendencia mensual</div>
    <div class="chart-bars">
      ${months.map(m=>`<div class="bar-col"><div style="font-size:10px;color:var(--muted)">$${m.v}</div><div class="bar-rect" style="height:${Math.round((m.v/max)*80)}px;background:${m.m==='Mar'?'var(--coral)':'var(--coral-light)'}"></div><div style="font-size:11px;color:var(--muted)">${m.m}</div></div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="stitle">Detalle por marca</div>
    ${[{brand:'NutriBox',sales:48,amt:'$187',pct:'12%'},{brand:'FlowSport',sales:31,amt:'$155',pct:'15%'},{brand:'CookMaster',sales:89,amt:'$312',pct:'13%'}].map(r=>`<div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)"><div class="av av-o" style="margin-right:10px;width:32px;height:32px;font-size:12px">${r.brand[0]}</div><div style="flex:1"><div style="font-size:13px;font-weight:500">${r.brand}</div><div style="font-size:12px;color:var(--muted)">${r.sales} ventas · ${r.pct}</div></div><div style="font-size:15px;font-weight:600">${r.amt}</div></div>`).join('')}
  </div>`;
}

function iProfile(){
  return hdr('Mi perfil','')+`<div class="grid2">
  <div class="card">
    <div style="display:flex;gap:14px;align-items:center;margin-bottom:18px">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--coral);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:white">C</div>
      <div><div style="font-size:16px;font-weight:600">Camila Torres</div><div style="font-size:13px;color:var(--muted)">@camila_fit</div><span class="badge b-info" style="margin-top:5px;display:inline-block">Verificada</span></div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:14px">
      ${[['Email','camila@mail.com'],['País','Argentina'],['Nicho','Fitness & Bienestar'],['Seguidores','42.000']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">${l}</span><span style="font-weight:500">${v}</span></div>`).join('')}
    </div>
    <button class="btn-s" style="width:100%;margin-top:14px">Editar perfil</button>
  </div>
  <div>
    <div class="card" style="margin-bottom:12px">
      <div class="stitle">Mis redes sociales</div>
      ${[{red:'Instagram',handle:'@camila_fit',seg:'42K'},{red:'TikTok',handle:'@camilafit_ok',seg:'18K'},{red:'YouTube',handle:'Camila Fit',seg:'8.5K'}].map(r=>`<div class="row sep" style="padding:9px 0;font-size:13px"><div><span style="font-weight:500">${r.red}</span><span style="color:var(--muted);margin-left:8px">${r.handle}</span></div><span style="color:var(--coral);font-weight:600">${r.seg}</span></div>`).join('')}
      <button class="btn-s" style="width:100%;margin-top:12px;font-size:12px">+ Agregar red social</button>
    </div>
    <div class="card">
      <div class="stitle">Métricas de audiencia</div>
      ${[{l:'Tasa de engagement',v:'4.8%',c:'var(--coral)',w:78},{l:'Alcance promedio',v:'12.400',c:'var(--purple)',w:62},{l:'Audiencia femenina',v:'68%',c:'var(--teal)',w:68}].map(m=>`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span style="color:var(--muted)">${m.l}</span><span style="font-weight:600;color:${m.c}">${m.v}</span></div><div class="bar-wrap"><div class="bar-fill" style="width:${m.w}%;background:${m.c}"></div></div></div>`).join('')}
    </div>
  </div></div>`;
}

/* ─── BRAND VIEWS ─── */
function bView(){
  if(sec==='dashboard')return bDash();
  if(sec==='campaigns')return bCamp();
  if(sec==='applications')return bApps();
  if(sec==='analytics')return bAnalytics();
  if(sec==='settings')return bSettings();
  return '';
}

function bDash(){
  return hdr('Panel de marca · NutriBox ✦','12 nuevas postulaciones esta semana','+ Nueva campaña')+`
  <div class="mgrid">
    <div class="mcard"><div class="mlbl">Campañas activas</div><div class="mval" style="color:var(--coral)">3</div><div class="msub up">+1 este mes</div></div>
    <div class="mcard"><div class="mlbl">Influencers activos</div><div class="mval">18</div><div class="msub">+4 en proceso</div></div>
    <div class="mcard"><div class="mlbl">Alcance total</div><div class="mval">892K</div><div class="msub">seguidores combinados</div></div>
    <div class="mcard"><div class="mlbl">Ventas referidas</div><div class="mval" style="color:var(--purple)">$14.200</div><div class="msub up">+22% vs mes ant.</div></div>
  </div>
  <div class="grid2">
    <div>
      <div class="stitle">Campañas activas</div>
      ${[{name:'Caja Starter',inf:8,v:245},{name:'Kit Premium',inf:7,v:189},{name:'Snack Pack Kids',inf:3,v:41}].map(c=>`<div class="card row"><div><div style="font-weight:600;font-size:14px">${c.name}</div><div style="font-size:12px;color:var(--muted)">${c.inf} influencers activos</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:600">${c.v} ventas</div><span class="badge b-ok">Activa</span></div></div>`).join('')}
    </div>
    <div>
      <div class="stitle">Últimas postulaciones</div>
      ${[{n:'@sofi.wellness',seg:'28K',niche:'Bienestar',match:'95%'},{n:'@martin_runner',seg:'15K',niche:'Fitness',match:'88%'},{n:'@luz_vegana',seg:'42K',niche:'Nutrición',match:'92%'}].map(i=>`<div class="card row"><div style="display:flex;gap:10px;align-items:center"><div class="av av-p">${i.n[1].toUpperCase()}</div><div><div style="font-size:13px;font-weight:500">${i.n}</div><div style="font-size:12px;color:var(--muted)">${i.seg} · ${i.niche}</div></div></div><div style="text-align:right"><div style="font-size:15px;font-weight:600;color:var(--teal)">${i.match}</div><div style="font-size:10px;color:var(--hint)">match estimado</div></div></div>`).join('')}
    </div>
  </div>`;
}

function bCamp(){
  const data=[{name:'Caja Starter',prod:'Pack bienvenida',com:'12%',desc:'20%',inf:8,v:245,budget:'$2.400',st:'Activa'},{name:'Kit Premium',prod:'Caja premium mensual',com:'15%',desc:'18%',inf:7,v:189,budget:'$3.200',st:'Activa'},{name:'Snack Pack Kids',prod:'Snacks para niños',com:'10%',desc:'15%',inf:3,v:41,budget:'$800',st:'Activa'},{name:'Summer Edition',prod:'Edición verano',com:'18%',desc:'22%',inf:0,v:0,budget:'$5.000',st:'Borrador'}];
  return hdr('Mis campañas','','+ Crear campaña')+data.map(c=>`<div class="card"><div class="row" style="margin-bottom:12px"><div><div style="font-size:16px;font-weight:600">${c.name}</div><div style="font-size:12px;color:var(--muted)">${c.prod}</div></div><div style="display:flex;gap:8px;align-items:center"><span class="badge ${c.st==='Activa'?'b-ok':'b-warn'}">${c.st}</span><button class="btn-s" style="font-size:11px;padding:5px 12px">Editar</button></div></div><div style="display:flex;gap:2rem;padding:10px;background:var(--bg);border-radius:8px"><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Comisión</div><div style="font-weight:600;color:var(--coral);font-size:17px">${c.com}</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Descuento</div><div style="font-weight:600;color:var(--purple);font-size:17px">${c.desc}</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Influencers</div><div style="font-weight:600;font-size:17px">${c.inf}</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Ventas</div><div style="font-weight:600;font-size:17px">${c.v}</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Presupuesto</div><div style="font-weight:600;font-size:17px">${c.budget}</div></div></div></div>`).join('');
}

function bApps(){
  const data=[{n:'@sofi.wellness',seg:'28K',niche:'Bienestar',eng:'5.2%',camp:'Caja Starter',match:'95%',st:'Pendiente'},{n:'@martin_runner',seg:'15K',niche:'Fitness',eng:'4.1%',camp:'Kit Premium',match:'88%',st:'Pendiente'},{n:'@luz_vegana',seg:'42K',niche:'Nutrición',eng:'6.8%',camp:'Caja Starter',match:'92%',st:'Pendiente'},{n:'@health_pablo',seg:'9K',niche:'Nutrición',eng:'7.2%',camp:'Kit Premium',match:'85%',st:'Aceptado'},{n:'@cocina_vale',seg:'55K',niche:'Gastro',eng:'3.9%',camp:'Snack Pack Kids',match:'72%',st:'Rechazado'}];
  return hdr('Postulaciones recibidas','3 pendientes de revisión')+data.map(a=>`<div class="card"><div style="display:flex;align-items:center;gap:12px"><div class="av av-p" style="width:44px;height:44px;font-size:16px">${a.n[1].toUpperCase()}</div><div style="flex:1"><div class="row"><div style="font-weight:600;font-size:14px">${a.n}</div><span class="badge ${a.st==='Aceptado'?'b-ok':a.st==='Rechazado'?'b-err':'b-warn'}">${a.st}</span></div><div style="font-size:12px;color:var(--muted);margin-top:3px">${a.seg} seg · ${a.niche} · Eng: ${a.eng}</div><div class="row" style="margin-top:10px"><span style="font-size:12px;background:var(--bg);padding:3px 9px;border-radius:6px;color:var(--muted)">Campaña: ${a.camp}</span><div style="display:flex;gap:8px;align-items:center"><span style="font-size:13px;color:var(--teal);font-weight:600">Match ${a.match}</span>${a.st==='Pendiente'?'<button class="btn-s" style="font-size:11px;padding:4px 10px">Rechazar</button><button class="btn-p" style="font-size:11px;padding:4px 10px">Aceptar</button>':''}</div></div></div></div></div>`).join('');
}

function bAnalytics(){
  const months=[{m:'Oct',v:9200},{m:'Nov',v:11400},{m:'Dic',v:14800},{m:'Ene',v:13200},{m:'Feb',v:12100},{m:'Mar',v:14200}];
  const max=14800;
  return hdr('Métricas de rendimiento','Resultados acumulados de todas las campañas')+`
  <div class="mgrid" style="margin-bottom:1.25rem">
    <div class="mcard"><div class="mlbl">ROI campañas</div><div class="mval" style="color:var(--teal)">4.2x</div><div class="msub up">+0.8 vs mes ant.</div></div>
    <div class="mcard"><div class="mlbl">Costo por venta</div><div class="mval">$3.20</div><div class="msub up">-12% eficiencia</div></div>
    <div class="mcard"><div class="mlbl">Ticket promedio</div><div class="mval" style="color:var(--coral)">$58</div><div class="msub">+$4 este mes</div></div>
    <div class="mcard"><div class="mlbl">Tasa conversión</div><div class="mval">3.4%</div><div class="msub">Industria: 2.1%</div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="stitle">Ventas referidas por mes</div>
      <div class="chart-bars">
        ${months.map(m=>`<div class="bar-col"><div style="font-size:10px;color:var(--muted)">$${(m.v/1000).toFixed(1)}k</div><div class="bar-rect" style="height:${Math.round((m.v/max)*80)}px;background:${m.m==='Mar'?'var(--coral)':'var(--coral-light)'}"></div><div style="font-size:11px;color:var(--muted)">${m.m}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="stitle">Top influencers por ventas</div>
      ${[{n:'@camila_fit',v:89,r:'$5.162'},{n:'@sofi.wellness',v:67,r:'$3.886'},{n:'@luz_vegana',v:54,r:'$3.132'},{n:'@health_pablo',v:35,r:'$2.030'}].map((i,idx)=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="width:20px;text-align:center;font-size:12px;font-weight:600;color:var(--hint)">${idx+1}</div><div style="flex:1;font-size:13px;font-weight:500">${i.n}</div><div style="font-size:12px;color:var(--muted)">${i.v} ventas</div><div style="font-size:13px;font-weight:600;color:var(--coral)">${i.r}</div></div>`).join('')}
    </div>
  </div>`;
}

function bSettings(){
  return hdr('Configuración de marca','')+`<div class="grid2">
  <div class="card">
    <div class="stitle">Datos de la empresa</div>
    ${[['Nombre','NutriBox'],['Industria','Alimentos & Nutrición'],['País','Argentina'],['Web','nutribox.com.ar'],['Contacto','marketing@nutribox.com']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">${l}</span><span style="font-weight:500">${v}</span></div>`).join('')}
    <button class="btn-s" style="width:100%;margin-top:14px">Editar datos</button>
  </div>
  <div class="card">
    <div class="stitle">Preferencias de campaña</div>
    ${[['Nicho preferido','Salud & Nutrición'],['Seg. mínimos','5.000'],['Engagement mín.','3%'],['Ciclo de pago','Mensual'],['Moneda','USD']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">${l}</span><span style="font-weight:500">${v}</span></div>`).join('')}
    <button class="btn-s" style="width:100%;margin-top:14px">Editar preferencias</button>
  </div></div>`;
}

render();
</script>
