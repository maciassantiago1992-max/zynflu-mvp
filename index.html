<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zynflu — Conectando marcas con influencers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --coral:#D85A30;--coral-light:#FAECE7;--coral-dark:#993C1D;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --teal:#1D9E75;--teal-light:#E1F5EE;
  --admin:#1A1A18;--admin-light:#F1EFE8;
  --bg:#F7F6F3;--card:#FFFFFF;--border:#E8E6E0;
  --text:#1A1A18;--muted:#6B6A65;--hint:#9C9B96;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ─── AUTH ─── */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:1.5rem;}
.auth-wrap{width:100%;max-width:400px;}
.auth-logo{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:600;color:var(--coral);text-align:center;margin-bottom:6px;letter-spacing:-0.5px;}
.auth-logo span{color:var(--purple);}
.auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px;}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;}
.auth-field{margin-bottom:14px;}
.auth-label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;}
.auth-input{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border .15s;}
.auth-input:focus{border-color:var(--coral);}
.auth-select{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;}
.btn-main{width:100%;padding:11px;background:var(--coral);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;font-family:'DM Sans',sans-serif;transition:background .15s;}
.btn-main:hover{background:var(--coral-dark);}
.btn-main:disabled{opacity:.4;cursor:not-allowed;}
.auth-link{font-size:13px;color:var(--muted);text-align:center;margin-top:16px;}
.auth-link b{color:var(--purple);cursor:pointer;font-weight:500;}
.auth-link b:hover{text-decoration:underline;}
.steps-bar{display:flex;gap:6px;justify-content:center;margin-bottom:20px;}
.step-dot{width:28px;height:4px;border-radius:2px;background:var(--border);}
.step-dot.on{background:var(--coral);}
.step-label{font-size:12px;color:var(--hint);text-align:center;margin-bottom:16px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
.role-card{border:1px solid var(--border);border-radius:12px;padding:18px 12px;cursor:pointer;text-align:center;background:var(--card);transition:all .15s;}
.role-card:hover{border-color:var(--coral);background:var(--coral-light);}
.role-card.sel{border:2px solid var(--coral);background:var(--coral-light);}
.role-icon{font-size:28px;margin-bottom:10px;}
.role-name{font-size:14px;font-weight:600;color:var(--text);}
.role-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}
.atag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:6px;font-weight:600;}
.atag-cr{background:var(--coral-light);color:var(--coral-dark);}
.atag-br{background:var(--purple-light);color:var(--purple);}
.atag-ad{background:var(--admin);color:white;}
.success-icon{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:26px;}
.error-msg{background:#FCEBEB;color:#A32D2D;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;display:none;}

/* Categorías múltiples */
.niche-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.niche-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--card);color:var(--muted);transition:all .15s;}
.niche-pill:hover{border-color:var(--coral);color:var(--coral);}
.niche-pill.sel{background:var(--coral-light);border-color:var(--coral);color:var(--coral-dark);font-weight:500;}

/* ─── APP ─── */
#app-screen{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;color:var(--coral);letter-spacing:-0.5px;}
.logo span{color:var(--purple);}
.tagline{font-size:12px;color:var(--hint);padding-left:12px;border-left:1px solid var(--border);margin-left:4px;}
.role-sw{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:2px;}
.rbtn{font-size:13px;padding:5px 16px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s;}
.rbtn.on{background:var(--card);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.user-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.logout-btn{font-size:12px;color:var(--hint);cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;}
.logout-btn:hover{background:var(--bg);}
.layout{display:flex;flex:1;}
.sidebar{width:210px;background:var(--card);border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.seclabel{font-size:10px;color:var(--hint);padding:6px 10px 8px;text-transform:uppercase;letter-spacing:.7px;}
.nitem{padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--muted);border:none;background:transparent;text-align:left;width:100%;display:flex;align-items:center;gap:9px;font-family:'DM Sans',sans-serif;transition:all .12s;}
.nitem.on{background:var(--coral-light);color:var(--coral-dark);font-weight:500;}
.nitem.on-admin{background:var(--admin);color:white;font-weight:500;}
.nitem:hover:not(.on):not(.on-admin){background:var(--bg);}
.nicn{font-size:14px;width:18px;text-align:center;}
.content{flex:1;padding:1.5rem;overflow-y:auto;background:var(--bg);}
.pgheader{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;}
.pgtitle{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;letter-spacing:-.3px;}
.pgsub{font-size:13px;color:var(--muted);margin-top:4px;}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.mgrid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
.mcard.dark{background:var(--admin);border-color:var(--admin);}
.mcard.dark .mlbl{color:#888780;}
.mcard.dark .mval{color:white;}
.mcard.dark .msub{color:#888780;}
.mlbl{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.mval{font-size:24px;font-weight:600;font-family:'Space Grotesk',sans-serif;letter-spacing:-.5px;}
.msub{font-size:11px;color:var(--hint);margin-top:4px;}
.msub.up{color:var(--teal);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px;}
.card:last-child{margin-bottom:0;}
.stitle{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text);}
.row{display:flex;justify-content:space-between;align-items:center;}
.sep{border-bottom:1px solid var(--border);}
.badge{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;display:inline-block;}
.b-ok{background:var(--teal-light);color:#0F6E56;}
.b-warn{background:#FAEEDA;color:#854F0B;}
.b-info{background:var(--purple-light);color:var(--purple);}
.b-err{background:#FCEBEB;color:#A32D2D;}
.b-dark{background:var(--admin);color:white;}
.btn-p{background:var(--coral);color:white;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
.btn-p:hover{background:var(--coral-dark);}
.btn-s{background:transparent;color:var(--text);border:1px solid var(--border);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;}
.btn-s:hover{background:var(--bg);}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
.av-o{background:var(--coral-light);color:var(--coral);}
.av-p{background:var(--purple-light);color:var(--purple);}
.av-sq{border-radius:9px;}
.bar-wrap{background:var(--bg);border-radius:4px;height:7px;overflow:hidden;margin-top:5px;}
.bar-fill{background:var(--coral);height:100%;border-radius:4px;}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.bar-rect{width:100%;border-radius:4px 4px 0 0;}
select{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;}
.mono{font-family:monospace;font-size:12px;background:var(--bg);padding:2px 7px;border-radius:4px;color:var(--text);}
.admin-table{width:100%;border-collapse:collapse;font-size:13px;}
.admin-table th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:8px 12px;border-bottom:1px solid var(--border);}
.admin-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.admin-table tr:last-child td{border-bottom:none;}
.alert-box{background:#FAEEDA;border:1px solid #EF9F27;border-radius:10px;padding:14px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-wrap" id="auth-content"></div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <span class="logo">Zyn<span>flu</span></span>
    <span class="tagline" id="topbar-tagline">Conectando marcas con influencers</span>
    <div id="topbar-right" style="margin-left:auto;display:flex;align-items:center;gap:10px;"></div>
  </div>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
/* SUPABASE */
const SUPABASE_URL='https://vxinlidikyepkxcariil.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4aW5saWRpa3llcGt4Y2FyaWlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Nzg0MjIsImV4cCI6MjA5MDM1NDQyMn0.uyQ1HJQgX4k49zj9obqyuIK4A6Z6Nad0C9nqtEFLXWo';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

/* STATE */
let authState={screen:'login',role:null};
let currentUser=null;
let selectedNiches=[];

const NICHES=['Fitness & Bienestar','Moda & Estilo','Nutrición','Gastronomía','Tecnología','Gaming','Viajes','Lifestyle','Deporte','Maternidad & Familia','Belleza & Skincare','Educación','Mascotas','Arte & Creatividad','Música','Sustentabilidad','Finanzas personales','Otro'];

/* AUTH HELPERS */
function showError(msg){const el=document.getElementById('auth-error');if(el){el.textContent=msg;el.style.display='block';}}
function hideError(){const el=document.getElementById('auth-error');if(el)el.style.display='none';}

/* LOGIN */
async function doLogin(){
  hideError();
  const email=document.getElementById('a-email').value;
  const pass=document.getElementById('a-pass').value;
  if(!email||!pass){showError('Completá email y contraseña');return;}
  const btn=document.querySelector('.btn-main');
  btn.disabled=true;btn.textContent='Ingresando...';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showError('Email o contraseña incorrectos');btn.disabled=false;btn.textContent='Ingresar';return;}
  currentUser=data.user;
  await loadUserAndEnterApp();
}

/* REGISTRO */
async function doRegister(){
  hideError();
  const name=document.getElementById('a-name').value;
  const email=document.getElementById('a-email').value;
  const pass=document.getElementById('a-pass').value;
  if(!name||!email||!pass){showError('Completá todos los campos');return;}
  if(pass.length<8){showError('La contraseña debe tener mínimo 8 caracteres');return;}
  const btn=document.querySelector('.btn-main');
  btn.disabled=true;btn.textContent='Creando cuenta...';
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name,role:authState.role||'creator'}}});
  if(error){showError(error.message);btn.disabled=false;btn.textContent='Crear cuenta';return;}
  currentUser=data.user;
  goAuth('role-select');
}

/* TOGGLE NICHO */
function toggleNiche(n){
  if(selectedNiches.includes(n)){selectedNiches=selectedNiches.filter(x=>x!==n);}
  else{selectedNiches.push(n);}
  document.querySelectorAll('.niche-pill').forEach(p=>{
    p.classList.toggle('sel',selectedNiches.includes(p.dataset.n));
  });
}

/* ONBOARDING CREATOR */
async function doOnboardingCreator(){
  hideError();
  const handle=document.getElementById('ob-handle').value;
  const country=document.getElementById('ob-country').value;
  if(!handle){showError('El handle es obligatorio');return;}
  if(selectedNiches.length===0){showError('Elegí al menos una categoría');return;}
  const btn=document.querySelector('.btn-main');
  btn.disabled=true;btn.textContent='Guardando...';
  const{error}=await sb.from('creator_profiles').upsert({
    user_id:currentUser.id,
    handle:handle.replace('@',''),
    niche:selectedNiches.join(', '),
    country,status:'pending'
  });
  if(error){showError('Error al guardar. Intentá de nuevo.');btn.disabled=false;btn.textContent='Continuar';return;}
  goAuth('onboarding-creator-2');
}

/* ONBOARDING CREATOR REDES */
async function doOnboardingCreatorRedes(){
  const ig=document.getElementById('ob-ig').value;
  const tt=document.getElementById('ob-tt').value;
  const yt=document.getElementById('ob-yt').value;
  const btn=document.querySelector('.btn-main');
  btn.disabled=true;btn.textContent='Guardando...';
  await sb.from('creator_profiles').update({
    instagram_handle:ig.replace('@',''),
    tiktok_handle:tt.replace('@',''),
    youtube_handle:yt
  }).eq('user_id',currentUser.id);
  goAuth('success-creator');
}

/* ONBOARDING BRAND */
async function doOnboardingBrand(){
  hideError();
  const company=document.getElementById('ob-company').value;
  const industry=document.getElementById('ob-industry').value;
  const website=document.getElementById('ob-website').value;
  if(!company){showError('El nombre de la marca es obligatorio');return;}
  const btn=document.querySelector('.btn-main');
  btn.disabled=true;btn.textContent='Guardando...';
  const{error}=await sb.from('brand_profiles').upsert({
    user_id:currentUser.id,company_name:company,industry,website,status:'active'
  });
  if(error){showError('Error: '+error.message);btn.disabled=false;btn.textContent='Continuar';return;}
  goAuth('onboarding-brand-2');
}

/* ONBOARDING BRAND PREFS */
async function doOnboardingBrandPrefs(){
  const niche=document.getElementById('ob-niche-brand').value;
  const minF=document.getElementById('ob-minfollowers').value;
  const platform=document.getElementById('ob-platform').value;
  const btn=document.querySelector('.btn-main');
  btn.disabled=true;btn.textContent='Guardando...';
  await sb.from('brand_profiles').update({
    preferred_niche:niche,min_followers:parseInt(minF)||0,ecommerce_platform:platform
  }).eq('user_id',currentUser.id);
  goAuth('success-brand');
}

/* CARGAR USUARIO */
async function loadUserAndEnterApp(){
  const{data:userData}=await sb.from('users').select('role').eq('id',currentUser.id).single();
  const userRole=userData?.role||currentUser?.user_metadata?.role||'creator';
  if(userRole==='admin'){enterApp('admin');}
  else if(userRole==='brand'){enterApp('brand');}
  else{enterApp('influencer');}
}

/* LOGOUT */
async function logout(){
  await sb.auth.signOut();
  currentUser=null;
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  authState={screen:'login',role:null};
  selectedNiches=[];
  renderAuth();
}

/* CHECK SESSION */
async function checkSession(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){currentUser=session.user;await loadUserAndEnterApp();}
  else{renderAuth();}
}

/* AUTH SCREENS */
const authScreens={
  login:()=>`
    <div class="auth-logo">Zyn<span>flu</span></div>
    <div class="auth-sub">Conectá marcas con influencers</div>
    <div class="auth-card">
      <div id="auth-error" class="error-msg"></div>
      <div class="auth-field"><label class="auth-label">Email</label><input class="auth-input" type="email" id="a-email" placeholder="tu@email.com"/></div>
      <div class="auth-field"><label class="auth-label">Contraseña</label><input class="auth-input" type="password" id="a-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn-main" onclick="doLogin()">Ingresar</button>
    </div>
    <div class="auth-link">¿No tenés cuenta? <b onclick="goAuth('register')">Registrate gratis</b></div>
  `,
  register:()=>`
    <div class="auth-logo">Zyn<span>flu</span></div>
    <div class="auth-sub">Creá tu cuenta gratuita</div>
    <div class="auth-card">
      <div id="auth-error" class="error-msg"></div>
      <div class="auth-field"><label class="auth-label">Nombre completo</label><input class="auth-input" type="text" id="a-name" placeholder="Tu nombre"/></div>
      <div class="auth-field"><label class="auth-label">Email</label><input class="auth-input" type="email" id="a-email" placeholder="tu@email.com"/></div>
      <div class="auth-field"><label class="auth-label">Contraseña</label><input class="auth-input" type="password" id="a-pass" placeholder="Mínimo 8 caracteres"/></div>
      <button class="btn-main" onclick="doRegister()">Crear cuenta</button>
    </div>
    <div class="auth-link">¿Ya tenés cuenta? <b onclick="goAuth('login')">Ingresá</b></div>
  `,
  'role-select':()=>`
    <div class="steps-bar"><div class="step-dot on"></div><div class="step-dot"></div><div class="step-dot"></div></div>
    <div class="auth-logo">Zyn<span>flu</span></div>
    <div class="auth-sub">¿Cómo vas a usar Zynflu?</div>
    <div class="auth-card">
      <div class="role-grid">
        <div class="role-card ${authState.role==='creator'?'sel':''}" onclick="selectRole('creator')">
          <div class="role-icon">◉</div>
          <div class="role-name">Soy creator</div>
          <div class="role-desc">Quiero monetizar mi audiencia</div>
        </div>
        <div class="role-card ${authState.role==='brand'?'sel':''}" onclick="selectRole('brand')">
          <div class="role-icon">◈</div>
          <div class="role-name">Soy marca</div>
          <div class="role-desc">Quiero vender con influencers</div>
        </div>
      </div>
      <button class="btn-main" onclick="goOnboarding()" ${!authState.role?'disabled':''}>Continuar</button>
    </div>
  `,
  'onboarding-creator-1':()=>`
    <div class="steps-bar"><div class="step-dot on"></div><div class="step-dot on"></div><div class="step-dot"></div></div>
    <div class="step-label">Paso 2 de 3 · <span class="atag atag-cr">Creator</span></div>
    <div class="auth-card">
      <div id="auth-error" class="error-msg"></div>
      <div style="font-size:16px;font-weight:600;margin-bottom:18px">Tu perfil público</div>
      <div class="auth-field"><label class="auth-label">Handle / usuario</label><input class="auth-input" type="text" id="ob-handle" placeholder="@tu_usuario"/></div>
      <div class="auth-field">
        <label class="auth-label">Categorías (elegí todas las que apliquen)</label>
        <div class="niche-grid">${NICHES.map(n=>`<div class="niche-pill" data-n="${n}" onclick="toggleNiche('${n}')">${n}</div>`).join('')}</div>
      </div>
      <div class="auth-field" style="margin-top:14px"><label class="auth-label">País</label><input class="auth-input" type="text" id="ob-country" placeholder="Uruguay"/></div>
      <button class="btn-main" style="margin-top:8px" onclick="doOnboardingCreator()">Continuar</button>
    </div>
  `,
  'onboarding-creator-2':()=>`
    <div class="steps-bar"><div class="step-dot on"></div><div class="step-dot on"></div><div class="step-dot on"></div></div>
    <div class="step-label">Paso 3 de 3 · <span class="atag atag-cr">Creator</span></div>
    <div class="auth-card">
      <div style="font-size:16px;font-weight:600;margin-bottom:18px">Tus redes sociales</div>
      <div class="auth-field"><label class="auth-label">Instagram</label><input class="auth-input" type="text" id="ob-ig" placeholder="@usuario"/></div>

function goAuth(s){authState.screen=s;renderAuth();}
function selectRole(r){authState.role=r;renderAuth();}
function goOnboarding(){if(!authState.role)return;goAuth(authState.role==='creator'?'onboarding-creator-1':'onboarding-brand-1');}
function renderAuth(){document.getElementById('auth-content').innerHTML=authScreens[authState.screen]();}

function enterApp(appRole){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  role=appRole;sec='dashboard';
  renderTopbarRight();
  render();
}

function renderTopbarRight(){
  const isAdmin=role==='admin';
  const isInf=role==='influencer';
  const name=currentUser?.user_metadata?.full_name||'Usuario';
  const initial=name.charAt(0).toUpperCase();
  if(isAdmin){
    document.getElementById('topbar-tagline').textContent='Panel de administración';
    document.getElementById('topbar-right').innerHTML=`
      <span class="atag atag-ad">Admin</span>
      <div class="user-av" style="background:var(--admin);color:white">${initial}</div>
      <button class="logout-btn" onclick="logout()">Salir</button>
    `;
  } else {
    document.getElementById('topbar-tagline').textContent='Conectando marcas con influencers';
    document.getElementById('topbar-right').innerHTML=`
      <div class="role-sw">
        <button class="rbtn ${isInf?'on':''}" onclick="switchRole('influencer',this)">Influencer</button>
        <button class="rbtn ${!isInf?'on':''}" onclick="switchRole('brand',this)">Marca</button>
      </div>
      <div class="user-av" style="background:${isInf?'var(--coral-light)':'var(--purple-light)'};color:${isInf?'var(--coral)':'var(--purple)'}">${initial}</div>
      <button class="logout-btn" onclick="logout()">Salir</button>
    `;
  }
}

/* APP */
let role='influencer',sec='dashboard';
const navI=[{id:'dashboard',icon:'◈',label:'Dashboard'},{id:'campaigns',icon:'◎',label:'Campañas'},{id:'contracts',icon:'◻',label:'Mis contratos'},{id:'earnings',icon:'◇',label:'Comisiones'},{id:'profile',icon:'◉',label:'Mi perfil'}];
const navB=[{id:'dashboard',icon:'◈',label:'Dashboard'},{id:'campaigns',icon:'◎',label:'Mis campañas'},{id:'applications',icon:'◻',label:'Postulaciones'},{id:'analytics',icon:'◇',label:'Métricas'},{id:'settings',icon:'◉',label:'Configuración'}];
const navAdmin=[{id:'dashboard',icon:'◈',label:'Dashboard'},{id:'creators',icon:'◉',label:'Creators'},{id:'brands',icon:'◈',label:'Marcas'},{id:'contracts',icon:'◻',label:'Contratos'},{id:'payouts',icon:'◇',label:'Liquidaciones'},{id:'settings',icon:'◎',label:'Configuración'}];

function switchRole(r,el){role=r;sec='dashboard';document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');render();}
function go(s){sec=s;render();}

function render(){
  const isAdmin=role==='admin';
  const nav=isAdmin?navAdmin:(role==='influencer'?navI:navB);
  const activeClass=isAdmin?'on-admin':'on';
  document.getElementById('sidebar').innerHTML=`<div class="seclabel">${isAdmin?'Admin':'Menú'}</div>`+nav.map(n=>`<button class="nitem${sec===n.id?' '+activeClass:''}" onclick="go('${n.id}')"><span class="nicn" style="color:${sec===n.id?(isAdmin?'white':'var(--coral)'):'var(--hint)'}">${n.icon}</span>${n.label}</button>`).join('');
  if(isAdmin) document.getElementById('content').innerHTML=adminView();
  else document.getElementById('content').innerHTML=role==='influencer'?iView():bView();
}

function hdr(t,s,b=''){return `<div class="pgheader"><div><div class="pgtitle">${t}</div>${s?`<div class="pgsub">${s}</div>`:''}</div>${b?`<button class="btn-p">${b}</button>`:''}</div>`;}

function bApps(){return hdr('Postulaciones','')+`<div class="card" style="text-align:center;padding:48px 24px"><div style="font-size:32px;margin-bottom:12px">◻</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Sin postulaciones todavía</div><div style="font-size:13px;color:var(--muted)">Cuando los influencers apliquen a tus campañas, aparecen acá</div></div>`;}
function bAnalytics(){return hdr('Métricas','')+`<div class="mgrid"><div class="mcard"><div class="mlbl">ROI</div><div class="mval">—</div></div><div class="mcard"><div class="mlbl">Costo por venta</div><div class="mval">—</div></div><div class="mcard"><div class="mlbl">Ticket promedio</div><div class="mval">—</div></div><div class="mcard"><div class="mlbl">Conversión</div><div class="mval">—</div></div></div><div class="card" style="text-align:center;padding:48px 24px"><div style="font-size:13px;color:var(--muted)">Las métricas aparecen cuando empiecen las ventas referidas</div></div>`;}
function bSettings(){
  const name=currentUser?.user_metadata?.full_name||'';
  const email=currentUser?.email||'';
  return hdr('Configuración','')+`<div class="grid2"><div class="card"><div class="stitle">Datos de la cuenta</div>${[['Nombre',name],['Email',email],['Rol','Marca']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">${l}</span><span style="font-weight:500">${v}</span></div>`).join('')}<button class="btn-s" style="width:100%;margin-top:14px">Editar datos</button></div>
  <div class="card"><div class="stitle">Preferencias</div><div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">Completá tu perfil de marca para aparecer en el buscador</div></div></div>`;
}

/* CARGAR DATOS ADMIN */
async function loadAdminData(){
  if(sec==='creators'){
    const{data}=await sb.from('creator_profiles').select('*, users(full_name,email,created_at)').order('created_at',{ascending:false});
    const tbody=document.getElementById('creators-tbody');
    if(!tbody)return;
    if(!data||data.length===0){tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">No hay creators registrados todavía</td></tr>`;return;}
    tbody.innerHTML=data.map(c=>`<tr>
      <td><div style="font-weight:500">${c.users?.full_name||'—'}</div><div style="font-size:12px;color:var(--muted)">${c.handle?'@'+c.handle:c.users?.email||'—'}</div></td>
      <td style="font-size:12px;color:var(--muted);max-width:160px">${c.niche||'—'}</td>
      <td style="font-size:12px">${[c.instagram_handle&&'IG',c.tiktok_handle&&'TT',c.youtube_handle&&'YT'].filter(Boolean).join(' · ')||'—'}</td>
      <td><span class="badge ${c.status==='active'?'b-ok':'b-warn'}">${c.status==='active'?'Activo':'En revisión'}</span></td>
      <td style="font-size:12px;color:var(--muted)">${c.users?.created_at?new Date(c.users.created_at).toLocaleDateString('es'):'—'}</td>
      <td><button class="btn-s" style="font-size:11px;padding:4px 10px">Ver</button></td>
    </tr>`).join('');
  }
  if(sec==='brands'){
    const{data}=await sb.from('brand_profiles').select('*, users(full_name,email,created_at)').order('created_at',{ascending:false});
    const tbody=document.getElementById('brands-tbody');
    if(!tbody)return;
    if(!data||data.length===0){tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">No hay marcas registradas todavía</td></tr>`;return;}
    tbody.innerHTML=data.map(b=>`<tr>
      <td><div style="font-weight:500">${b.company_name}</div><div style="font-size:12px;color:var(--muted)">${b.users?.email||'—'}</div></td>
      <td style="font-size:12px;color:var(--muted)">${b.industry||'—'}</td>
      <td style="font-size:12px"><a href="https://${b.website}" target="_blank" style="color:var(--purple)">${b.website||'—'}</a></td>
      <td><span class="badge ${b.status==='active'?'b-ok':'b-warn'}">${b.status==='active'?'Activa':'Suspendida'}</span></td>
      <td style="font-size:12px;color:var(--muted)">${b.users?.created_at?new Date(b.users.created_at).toLocaleDateString('es'):'—'}</td>
      <td><button class="btn-s" style="font-size:11px;padding:4px 10px">Ver</button></td>
    </tr>`).join('');
  }
}

/* OVERRIDE GO para admin data */
const _go=go;
function go(s){
  sec=s;render();
  if(role==='admin'&&(s==='creators'||s==='brands'))setTimeout(loadAdminData,100);
}

/* INIT */
checkSession();
</script>
