<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zynflu — Conectando marcas con influencers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --coral:#D85A30;--coral-light:#FAECE7;--coral-dark:#993C1D;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --teal:#1D9E75;--teal-light:#E1F5EE;
  --bg:#F7F6F3;--card:#FFFFFF;--border:#E8E6E0;
  --text:#1A1A18;--muted:#6B6A65;--hint:#9C9B96;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── AUTH ── */
#auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.auth-screen{width:100%;max-width:420px;}
.auth-logo{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:600;color:var(--coral);text-align:center;margin-bottom:6px;letter-spacing:-0.5px;}
.auth-logo span{color:var(--purple);}
.auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;}
.field{margin-bottom:16px;}
.field-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:9px;font-size:14px;background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--coral);}
.btn-main{width:100%;padding:11px;background:var(--coral);color:white;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;font-family:'DM Sans',sans-serif;transition:background .15s;}
.btn-main:hover{background:var(--coral-dark);}
.btn-main:disabled{opacity:.35;cursor:not-allowed;}
.btn-google{width:100%;padding:10px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:18px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .12s;}
.btn-google:hover{background:var(--bg);}
.g-dot{width:14px;height:14px;border-radius:50%;background:conic-gradient(#4285F4 0 25%,#EA4335 25% 50%,#FBBC04 50% 75%,#34A853 75%);}
.divider{display:flex;align-items:center;gap:10px;margin:0 0 18px;font-size:12px;color:var(--hint);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.auth-link{font-size:13px;color:var(--purple);cursor:pointer;text-align:center;margin-top:18px;font-weight:500;}
.auth-link:hover{text-decoration:underline;}
.steps{display:flex;gap:6px;justify-content:center;margin-bottom:16px;}
.sdot{width:28px;height:4px;border-radius:2px;background:var(--border);transition:background .2s;}
.sdot.on{background:var(--coral);}
.step-lbl{font-size:12px;color:var(--hint);text-align:center;margin-bottom:20px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0 20px;}
.role-card{border:1px solid var(--border);border-radius:12px;padding:20px 14px;cursor:pointer;text-align:center;background:var(--card);transition:all .15s;}
.role-card:hover{border-color:var(--coral);}
.role-card.sel{border:2px solid var(--coral);background:var(--coral-light);}
.role-icon{font-size:26px;margin-bottom:10px;}
.role-name{font-size:14px;font-weight:600;}
.role-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;color:var(--coral);letter-spacing:-0.5px;}
.logo span{color:var(--purple);}
.role-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;}
.rp-cr{background:var(--coral-light);color:var(--coral-dark);}
.rp-br{background:var(--purple-light);color:var(--purple);}
.btn-logout{margin-left:auto;font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 12px;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-logout:hover{background:var(--bg);}
.layout{display:flex;flex:1;}
.sidebar{width:210px;background:var(--card);border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.seclabel{font-size:10px;color:var(--hint);padding:6px 10px 8px;text-transform:uppercase;letter-spacing:.7px;}
.nitem{padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--muted);border:none;background:transparent;text-align:left;width:100%;display:flex;align-items:center;gap:9px;font-family:'DM Sans',sans-serif;transition:all .12s;}
.nitem.on{background:var(--coral-light);color:var(--coral-dark);font-weight:600;}
.nitem:hover:not(.on){background:var(--bg);}
.nicn{font-size:14px;width:18px;text-align:center;}
.content{flex:1;padding:1.5rem;overflow-y:auto;background:var(--bg);}
.pgheader{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;}
.pgtitle{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;letter-spacing:-.3px;}
.pgsub{font-size:13px;color:var(--muted);margin-top:4px;}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.mgrid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
.mlbl{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.mval{font-size:24px;font-weight:600;font-family:'Space Grotesk',sans-serif;letter-spacing:-.5px;}
.msub{font-size:11px;color:var(--hint);margin-top:4px;}
.msub.up{color:var(--teal);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px;}
.card:last-child{margin-bottom:0;}
.stitle{font-size:13px;font-weight:600;margin-bottom:12px;}
.row{display:flex;justify-content:space-between;align-items:center;}
.sep{border-bottom:1px solid var(--border);}
.badge{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;display:inline-block;}
.b-ok{background:var(--teal-light);color:#0F6E56;}
.b-warn{background:#FAEEDA;color:#854F0B;}
.b-info{background:var(--purple-light);color:var(--purple);}
.b-err{background:#FCEBEB;color:#A32D2D;}
.btn-p{background:var(--coral);color:white;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
.btn-p:hover{background:var(--coral-dark);}
.btn-s{background:transparent;color:var(--text);border:1px solid var(--border);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;}
.btn-s:hover{background:var(--bg);}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
.av-o{background:var(--coral-light);color:var(--coral);}
.av-p{background:var(--purple-light);color:var(--purple);}
.av-sq{border-radius:9px;}
.bar-wrap{background:var(--bg);border-radius:4px;height:7px;overflow:hidden;margin-top:5px;}
.bar-fill{height:100%;border-radius:4px;}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.bar-rect{width:100%;border-radius:4px 4px 0 0;}
select{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;}
.mono{font-family:monospace;font-size:12px;background:var(--bg);padding:2px 7px;border-radius:4px;}
</style>
</head>
<body>

<div id="auth-wrap">
  <div class="auth-screen" id="auth-screen"></div>
</div>

<div id="app">
  <div class="topbar">
    <span class="logo">Zyn<span>flu</span></span>
    <span class="role-pill" id="role-badge"></span>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
var S = { screen:'login', role:null, userRole:null, sec:'dashboard' };

var AUTH = {
  login: function(){ return '<div class="auth-logo">Zyn<span>flu</span></div><div class="auth-sub">Conectando marcas con influencers</div><div class="auth-card"><button class="btn-google"><div class="g-dot"></div>Continuar con Google</button><div class="divider">o ingresá con email</div><div class="field"><div class="field-label">Email</div><input type="email" placeholder="tu@email.com"/></div><div class="field"><div class="field-label">Contraseña</div><input type="password" placeholder="••••••••"/></div><button class="btn-main" onclick="ga(\'role-select\')">Ingresar</button></div><div class="auth-link" onclick="ga(\'register\')">¿No tenés cuenta? Registrate gratis</div>'; },
  register: function(){ return '<div class="auth-logo">Zyn<span>flu</span></div><div class="auth-sub">Creá tu cuenta gratuita</div><div class="auth-card"><button class="btn-google"><div class="g-dot"></div>Registrarse con Google</button><div class="divider">o con email</div><div class="field"><div class="field-label">Nombre completo</div><input type="text" placeholder="Tu nombre"/></div><div class="field"><div class="field-label">Email</div><input type="email" placeholder="tu@email.com"/></div><div class="field"><div class="field-label">Contraseña</div><input type="password" placeholder="Mínimo 8 caracteres"/></div><button class="btn-main" onclick="ga(\'role-select\')">Crear cuenta</button></div><div class="auth-link" onclick="ga(\'login\')">¿Ya tenés cuenta? Ingresá</div>'; },
  'role-select': function(){
    return '<div class="steps"><div class="sdot on"></div><div class="sdot"></div><div class="sdot"></div></div><div class="auth-logo" style="margin-bottom:4px">Zyn<span>flu</span></div><div class="auth-sub">¿Cómo vas a usar Zynflu?</div><div class="auth-card"><div class="role-grid"><div class="role-card'+(S.role==='creator'?' sel':'')+'" onclick="selRole(\'creator\')"><div class="role-icon">◉</div><div class="role-name">Soy creator</div><div class="role-desc">Quiero monetizar mi audiencia con marcas</div></div><div class="role-card'+(S.role==='brand'?' sel':'')+'" onclick="selRole(\'brand\')"><div class="role-icon">◈</div><div class="role-name">Soy marca</div><div class="role-desc">Quiero vender más con influencers</div></div></div><button class="btn-main" onclick="goOb()" '+(S.role?'':'disabled')+'>Continuar</button></div>';
  },
  'ob-cr-1': function(){ return '<div class="steps"><div class="sdot on"></div><div class="sdot on"></div><div class="sdot"></div></div><div class="step-lbl">Paso 2 de 3 &middot; Tu perfil</div><div class="auth-card"><div style="font-size:15px;font-weight:600;margin-bottom:18px">Contanos sobre vos</div><div class="field"><div class="field-label">Handle / usuario</div><input type="text" placeholder="@tu_usuario"/></div><div class="field"><div class="field-label">Nicho principal</div><select><option>Fitness & Bienestar</option><option>Moda & Lifestyle</option><option>Tecnología</option><option>Gastronomía</option><option>Viajes</option><option>Gaming</option></select></div><div class="field"><div class="field-label">País</div><input type="text" placeholder="Argentina"/></div><button class="btn-main" onclick="ga(\'ob-cr-2\')">Continuar</button></div>'; },
  'ob-cr-2': function(){ return '<div class="steps"><div class="sdot on"></div><div class="sdot on"></div><div class="sdot on"></div></div><div class="step-lbl">Paso 3 de 3 &middot; Tus redes</div><div class="auth-card"><div style="font-size:15px;font-weight:600;margin-bottom:18px">¿Dónde está tu audiencia?</div><div class="field"><div class="field-label">Instagram</div><input type="text" placeholder="@usuario (seguidores aprox.)"/></div><div class="field"><div class="field-label">TikTok</div><input type="text" placeholder="@usuario (seguidores aprox.)"/></div><div class="field"><div class="field-label">YouTube (opcional)</div><input type="text" placeholder="Nombre del canal"/></div><button class="btn-main" onclick="enterApp(\'creator\')">Entrar a Zynflu</button></div>'; },
  'ob-br-1': function(){ return '<div class="steps"><div class="sdot on"></div><div class="sdot on"></div><div class="sdot"></div></div><div class="step-lbl">Paso 2 de 3 &middot; Tu empresa</div><div class="auth-card"><div style="font-size:15px;font-weight:600;margin-bottom:18px">Datos de tu marca</div><div class="field"><div class="field-label">Nombre de la marca</div><input type="text" placeholder="Ej: NutriBox"/></div><div class="field"><div class="field-label">Industria</div><select><option>Alimentos & Nutrición</option><option>Moda & Indumentaria</option><option>Tecnología</option><option>Belleza & Skincare</option><option>Deportes</option></select></div><div class="field"><div class="field-label">Sitio web</div><input type="text" placeholder="tutienda.com"/></div><button class="btn-main" onclick="ga(\'ob-br-2\')">Continuar</button></div>'; },
  'ob-br-2': function(){ return '<div class="steps"><div class="sdot on"></div><div class="sdot on"></div><div class="sdot on"></div></div><div class="step-lbl">Paso 3 de 3 &middot; Preferencias</div><div class="auth-card"><div style="font-size:15px;font-weight:600;margin-bottom:18px">¿Qué creators buscás?</div><div class="field"><div class="field-label">Nicho de influencers</div><select><option>Salud & Nutrición</option><option>Moda</option><option>Tecnología</option><option>Lifestyle</option><option>Todos</option></select></div><div class="field"><div class="field-label">Seguidores mínimos</div><select><option>Sin mínimo</option><option>1.000+</option><option>5.000+</option><option>10.000+</option></select></div><div class="field"><div class="field-label">Plataforma ecommerce</div><select><option>Shopify</option><option>WooCommerce</option><option>TiendaNube</option><option>Otra / Manual</option></select></div><button class="btn-main" onclick="enterApp(\'brand\')">Entrar a Zynflu</button></div>'; },
};

function ga(s){ S.screen=s; document.getElementById('auth-screen').innerHTML=AUTH[s](); }
function selRole(r){ S.role=r; ga('role-select'); }
function goOb(){ if(!S.role) return; ga(S.role==='creator'?'ob-cr-1':'ob-br-1'); }

function enterApp(role){
  S.userRole=role; S.sec='dashboard';
  document.getElementById('auth-wrap').style.display='none';
  document.getElementById('app').style.display='flex';
  var b=document.getElementById('role-badge');
  if(role==='creator'){ b.textContent='Creator'; b.className='role-pill rp-cr'; }
  else { b.textContent='Marca'; b.className='role-pill rp-br'; }
  renderApp();
}

function logout(){
  S.userRole=null; S.role=null; S.screen='login';
  document.getElementById('app').style.display='none';
  document.getElementById('auth-wrap').style.display='flex';
  ga('login');
}

var NAV_CR=[{id:'dashboard',icon:'◈',label:'Dashboard'},{id:'campaigns',icon:'◎',label:'Campañas'},{id:'contracts',icon:'◻',label:'Mis contratos'},{id:'earnings',icon:'◇',label:'Comisiones'},{id:'profile',icon:'◉',label:'Mi perfil'}];
var NAV_BR=[{id:'dashboard',icon:'◈',label:'Dashboard'},{id:'campaigns',icon:'◎',label:'Mis campañas'},{id:'applications',icon:'◻',label:'Postulaciones'},{id:'analytics',icon:'◇',label:'Métricas'},{id:'settings',icon:'◉',label:'Configuración'}];

function go(s){ S.sec=s; renderApp(); }

function renderApp(){
  var nav=S.userRole==='creator'?NAV_CR:NAV_BR;
  document.getElementById('sidebar').innerHTML='<div class="seclabel">Menú</div>'+nav.map(function(n){return '<button class="nitem'+(S.sec===n.id?' on':'')+'" onclick="go(\''+n.id+'\')"><span class="nicn" style="color:'+(S.sec===n.id?'var(--coral)':'var(--hint)')+'">'+n.icon+'</span>'+n.label+'</button>';}).join('');
  document.getElementById('content').innerHTML=S.userRole==='creator'?crView():brView();
}

function hdr(t,s,b){ return '<div class="pgheader"><div><div class="pgtitle">'+t+'</div>'+(s?'<div class="pgsub">'+s+'</div>':'')+' </div>'+(b?'<button class="btn-p">'+b+'</button>':'')+' </div>'; }

function crView(){
  if(S.sec==='dashboard') return crDash();
  if(S.sec==='campaigns') return crCamp();
  if(S.sec==='contracts') return crContr();
  if(S.sec==='earnings') return crEarn();
  if(S.sec==='profile') return crProf();
  return '';
}

function crDash(){
  return hdr('Hola, @camila_fit ✦','Tenés 3 nuevas oportunidades disponibles')+
  '<div class="mgrid"><div class="mcard"><div class="mlbl">Contratos activos</div><div class="mval" style="color:var(--coral)">4</div><div class="msub up">+1 este mes</div></div><div class="mcard"><div class="mlbl">Total ganado</div><div class="mval">$2,840</div><div class="msub">USD acumulado</div></div><div class="mcard"><div class="mlbl">Pago pendiente</div><div class="mval" style="color:var(--purple)">$420</div><div class="msub">Próximo: 1 abr</div></div><div class="mcard"><div class="mlbl">Código usado</div><div class="mval">312</div><div class="msub">veces este mes</div></div></div>'+
  '<div class="grid2"><div><div class="stitle">Contratos recientes</div>'+
  [{b:'NutriBox',p:'Cajas de snacks',st:'Activo',c:'12%'},{b:'FlowSport',p:'Ropa deportiva',st:'Activo',c:'15%'},{b:'SkinGlow',p:'Skincare set',st:'En revisión',c:'10%'}].map(function(x){ return '<div class="card row"><div style="display:flex;gap:10px;align-items:center"><div class="av av-o">'+x.b[0]+'</div><div><div style="font-size:13px;font-weight:500">'+x.b+'</div><div style="font-size:12px;color:var(--muted)">'+x.p+'</div></div></div><div style="text-align:right"><span class="badge '+(x.st==='Activo'?'b-ok':'b-warn')+'">'+x.st+'</span><div style="font-size:12px;color:var(--muted);margin-top:3px">'+x.c+' comisión</div></div></div>'; }).join('')+
  '</div><div><div class="stitle">Campañas disponibles</div>'+
  [{b:'VerdeMar',c:'Suplementos',com:'18%',d:'20%'},{b:'KidsPlay',c:'Juguetes',com:'14%',d:'15%'},{b:'BrewCo',c:'Café premium',com:'20%',d:'25%'}].map(function(x){ return '<div class="card row"><div style="display:flex;gap:10px;align-items:center"><div class="av av-p">'+x.b[0]+'</div><div><div style="font-size:13px;font-weight:500">'+x.b+'</div><div style="font-size:12px;color:var(--muted)">'+x.c+'</div></div></div><div style="text-align:right"><div style="font-size:16px;font-weight:600;color:var(--coral)">'+x.com+'</div><div style="font-size:11px;color:var(--muted)">'+x.d+' desc.</div></div></div>'; }).join('')+
  '</div></div>';
}

function crCamp(){
  return hdr('Campañas disponibles','Encontrá marcas que se alineen con tu audiencia')+
  '<div style="display:flex;gap:8px;margin-bottom:1rem"><select><option>Todas las categorías</option><option>Salud</option><option>Tech</option><option>Moda</option></select><select><option>Mayor comisión</option><option>Más reciente</option></select></div>'+
  [{b:'VerdeMar',p:'Suplementos naturales',c:'Salud',com:'18%',d:'20%',a:'18-35',m:'5K+'},{b:'KidsPlay',p:'Juguetes educativos',c:'Infantil',com:'14%',d:'15%',a:'25-40',m:'10K+'},{b:'BrewCo',p:'Café premium',c:'Gastro',com:'20%',d:'25%',a:'22-45',m:'3K+'},{b:'TechGear',p:'Accesorios tech',c:'Tech',com:'12%',d:'18%',a:'18-30',m:'8K+'},{b:'PetLove',p:'Comida mascotas',c:'Mascotas',com:'22%',d:'20%',a:'Todos',m:'2K+'}].map(function(x){ return '<div class="card"><div style="display:flex;gap:12px;align-items:flex-start"><div class="av av-p av-sq" style="width:44px;height:44px">'+x.b[0]+'</div><div style="flex:1"><div class="row"><div><div style="font-size:15px;font-weight:600">'+x.b+'</div><div style="font-size:12px;color:var(--muted)">'+x.p+' · '+x.c+'</div></div><span class="badge b-ok">Abierta</span></div><div style="display:flex;gap:1.5rem;margin-top:12px;padding:10px;background:var(--bg);border-radius:8px"><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Comisión</div><div style="font-size:17px;font-weight:600;color:var(--coral)">'+x.com+'</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Descuento</div><div style="font-size:17px;font-weight:600;color:var(--purple)">'+x.d+'</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Audiencia</div><div style="font-size:14px;font-weight:500;margin-top:2px">'+x.a+'</div></div><div><div style="font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px">Seg. mín.</div><div style="font-size:14px;font-weight:500;margin-top:2px">'+x.m+'</div></div></div></div><button class="btn-p" style="flex-shrink:0;margin-top:4px">Aplicar</button></div></div>'; }).join('');
}

function crContr(){
